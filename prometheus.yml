global:
  scrape_interval: 15s

scrape_configs:

  - job_name: 'spring'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8081']

  - job_name: 'pushgateway'
    static_configs:
      - targets: ['host.docker.internal:9091']

